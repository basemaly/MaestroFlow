# DeerFlow Development Environment
# Usage: docker-compose -f docker-compose-dev.yaml up --build
#
# Services:
#   - nginx: Reverse proxy (port 2027)
#   - frontend: Frontend Next.js dev server (port 3000)
#   - gateway: Backend Gateway API (port 8001)
#   - langgraph: LangGraph server (port 2024)
#   - provisioner (optional): Sandbox provisioner (creates Pods in host Kubernetes)
#
# Prerequisites:
#   - Kubernetes cluster + kubeconfig are only required when using provisioner mode.
#
# Access: http://localhost:2027

name: deer-flow-dev

services:
  langgraph-postgres:
    profiles:
      - core
    image: postgres:17
    container_name: deer-flow-langgraph-postgres
    environment:
      POSTGRES_DB: maestroflow_langgraph_v2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:55434:5432"
    volumes:
      - langgraph-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d maestroflow_langgraph_v2"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks:
      - deer-flow-dev
    restart: ${DOCKER_RESTART_POLICY:-no}

  langgraph-redis:
    profiles:
      - core
    image: redis:7-alpine
    container_name: deer-flow-langgraph-redis
    command: redis-server --save "" --appendonly no
    networks:
      - deer-flow-dev
    restart: ${DOCKER_RESTART_POLICY:-no}

  # ── Sandbox Provisioner ────────────────────────────────────────────────
  # Manages per-sandbox Pod + Service lifecycle in the host Kubernetes
  # cluster via the K8s API.
  # Backend accesses sandboxes directly via host.docker.internal:{NodePort}.
  provisioner:
    profiles:
      - provisioner
    build:
      context: ./provisioner
      dockerfile: Dockerfile
    container_name: deer-flow-provisioner
    volumes:
      - ~/.kube/config:/root/.kube/config:ro
    environment:
      - K8S_NAMESPACE=deer-flow
      - SANDBOX_IMAGE=ghcr.io/agent-infra/sandbox:latest
      # Host paths for K8s HostPath volumes (must be absolute paths accessible by K8s node)
      # On Docker Desktop/OrbStack, use your actual host paths like /Users/username/...
      # Set these in your shell before running docker-compose:
      #   export DEER_FLOW_ROOT=/absolute/path/to/deer-flow
      - SKILLS_HOST_PATH=${DEER_FLOW_ROOT:-/Volumes/BA/DEV/MaestroFlow}/skills
      - THREADS_HOST_PATH=${DEER_FLOW_ROOT:-/Volumes/BA/DEV/MaestroFlow}/backend/.deer-flow/threads
      - KUBECONFIG_PATH=/root/.kube/config
      - NODE_HOST=host.docker.internal
      # Override K8S API server URL since kubeconfig uses 127.0.0.1
      # which is unreachable from inside the container
      - K8S_API_SERVER=https://host.docker.internal:26443
    env_file:
      - ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - deer-flow-dev
    restart: ${DOCKER_RESTART_POLICY:-no}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  # ── Reverse Proxy ──────────────────────────────────────────────────────
  # Routes API traffic to gateway/langgraph and (optionally) provisioner.
  # Select nginx config via NGINX_CONF:
  # - nginx.local.conf (default): no provisioner route (local/aio modes)
  # - nginx.conf: includes provisioner route (provisioner mode)
  nginx:
    profiles:
      - core
    image: nginx:alpine
    container_name: deer-flow-nginx
    ports:
      - "2027:2027"
    volumes:
      - ./nginx/${NGINX_CONF:-nginx.conf}:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - gateway
      - langgraph
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - deer-flow-dev
    restart: ${DOCKER_RESTART_POLICY:-no}

  # Frontend - Next.js Development Server
  frontend:
    profiles:
      - core
    build:
      context: ../
      dockerfile: frontend/Dockerfile.dev
      args:
        PNPM_STORE_PATH: ${PNPM_STORE_PATH:-/root/.local/share/pnpm/store}
    container_name: deer-flow-frontend
    command: sh -c "pnpm run dev --hostname 0.0.0.0 --port 3000 2>&1 | tee /app/logs/frontend.log"
    volumes:
      - ../frontend:/app/frontend
      - ../logs:/app/logs
      # Mount pnpm store for caching
      - ${PNPM_STORE_PATH:-~/.local/share/pnpm/store}:/root/.local/share/pnpm/store
      - frontend-node-modules:/app/frontend/node_modules
    working_dir: /app/frontend
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CI=true
      - MAESTROFLOW_INTERNAL_GATEWAY_URL=http://gateway:8001
      - MAESTROFLOW_LOG_FORMAT=${MAESTROFLOW_LOG_FORMAT:-json}
    env_file:
      - ../frontend/.env
    networks:
      - deer-flow-dev
    restart: ${DOCKER_RESTART_POLICY:-no}

  # Backend - Gateway API
  gateway:
    profiles:
      - core
    build:
      context: ../
      dockerfile: backend/Dockerfile
      # cache_from disabled - requires manual setup: mkdir -p /tmp/docker-cache-gateway
    container_name: deer-flow-gateway
    command: sh -c "cd backend && uv run uvicorn src.gateway.app:app --host 0.0.0.0 --port 8001 --reload --reload-include='*.yaml .env' --no-access-log 2>&1 | tee /app/logs/gateway.log"
    volumes:
      - ../backend/src:/app/backend/src
      - ../backend/.env:/app/backend/.env
      - ../backend/.langgraph_api:/app/backend/.langgraph_api
      - ../config.yaml:/app/config.yaml
      - ../extensions_config.json:/app/extensions_config.json:ro
      - ../skills:/app/skills
      - ../logs:/app/logs
      - ../backend/.deer-flow:/app/.deer-flow
      # Mount uv cache for faster dependency installation
      - ~/.cache/uv:/root/.cache/uv
    working_dir: /app
    environment:
      - CI=true
      - MAESTROFLOW_LOG_FORMAT=${MAESTROFLOW_LOG_FORMAT:-json}
      - MAESTROFLOW_RUNTIME_PROFILE=${MAESTROFLOW_RUNTIME_PROFILE:-full}
      - LITELLM_PROXY_BASE_URL=http://host.docker.internal:4000/v1
      - LANGGRAPH_BASE_URL=http://langgraph:8000
      - GATEWAY_BASE_URL=http://gateway:8001
      - SURFSENSE_BASE_URL=http://host.docker.internal:8002
      - LANGFUSE_BASE_URL=http://host.docker.internal:3000
      - LANGFUSE_HOST=http://host.docker.internal:3000
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://host.docker.internal:3000/api/public/otel
      - LANGSMITH_WORKSPACE_ID=${LANGSMITH_WORKSPACE_ID:-}
      - LANGGRAPH_CHECKPOINTER_URL=postgresql://postgres:postgres@langgraph-postgres:5432/maestroflow_langgraph_v2
      - DEER_FLOW_EXTENSIONS_CONFIG_PATH=/app/extensions_config.json
    env_file:
      - ../.env
    extra_hosts:
      # For Linux: map host.docker.internal to host gateway
      - "host.docker.internal:host-gateway"
    networks:
      - deer-flow-dev
    restart: ${DOCKER_RESTART_POLICY:-no}

  # Backend - LangGraph Server
  langgraph:
    profiles:
      - core
    build:
      context: ../
      dockerfile: backend/Dockerfile
    container_name: deer-flow-langgraph
    command: sh -c "cd backend && uv run langgraph dev --host 0.0.0.0 --port 8000 --no-browser --allow-blocking --no-reload --n-jobs-per-worker ${LANGGRAPH_N_JOBS_PER_WORKER:-8} 2>&1 | tee /app/logs/langgraph.log"
    ports:
      - "127.0.0.1:2024:8000"
    depends_on:
      langgraph-postgres:
        condition: service_healthy
    environment:
      - CI=true
      - MAESTROFLOW_LOG_FORMAT=${MAESTROFLOW_LOG_FORMAT:-json}
      - LITELLM_PROXY_BASE_URL=http://host.docker.internal:4000/v1
      - SURFSENSE_BASE_URL=http://host.docker.internal:8002
      - LANGFUSE_BASE_URL=http://host.docker.internal:3000
      - LANGFUSE_HOST=http://host.docker.internal:3000
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://host.docker.internal:3000/api/public/otel
      - LANGSMITH_WORKSPACE_ID=${LANGSMITH_WORKSPACE_ID:-}
      - LANGGRAPH_CHECKPOINTER_URL=postgresql://postgres:postgres@langgraph-postgres:5432/maestroflow_langgraph_v2
      - LANGGRAPH_RUNTIME_EDITION=inmem
      - REDIS_URI=redis://langgraph-redis:6379/0
      - BG_JOB_ISOLATED_LOOPS=true
      - N_JOBS_PER_WORKER=${LANGGRAPH_N_JOBS_PER_WORKER:-8}
      - DEER_FLOW_CONFIG_PATH=/app/config.yaml
      - DEER_FLOW_EXTENSIONS_CONFIG_PATH=/app/extensions_config.json
    env_file:
      - ../.env
    volumes:
      - ../backend/src:/app/backend/src
      - ../backend/.env:/app/backend/.env
      - ../backend/.langgraph_api:/app/backend/.langgraph_api
      - ../config.yaml:/app/config.yaml:ro
      - ../extensions_config.json:/app/extensions_config.json:ro
      - ../skills:/app/skills:ro
      - ../logs:/app/logs
      - ../backend/.deer-flow:/app/backend/.deer-flow
      - ~/.cache/uv:/root/.cache/uv
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - deer-flow-dev
    restart: ${DOCKER_RESTART_POLICY:-no}

  activepieces:
    profiles:
      - core
    image: activepieces/activepieces:latest
    container_name: deer-flow-activepieces
    ports:
      - "18080:80"
    environment:
      - AP_POSTGRES_DATABASE=activepieces
      - AP_POSTGRES_HOST=langgraph-postgres
      - AP_POSTGRES_PORT=5432
      - AP_POSTGRES_USERNAME=postgres
      - AP_POSTGRES_PASSWORD=postgres
      - AP_REDIS_HOST=langgraph-redis
      - AP_REDIS_PORT=6379
      - AP_EXECUTION_MODE=UNSANDBOXED
      - AP_FRONTEND_URL=http://localhost:18080
      - AP_ENCRYPTION_KEY=e8a5b6c93427f7192bc58a983f4b6d21
      - AP_JWT_SECRET=f9d4b6a83921c57e6bd39a482f5b6c12
    depends_on:
      langgraph-postgres:
        condition: service_healthy
      langgraph-redis:
        condition: service_started
    networks:
      - deer-flow-dev
    restart: ${DOCKER_RESTART_POLICY:-no}

  openviking:
    profiles:
      - core
    image: ghcr.io/volcengine/openviking:latest
    container_name: deer-flow-openviking
    command: openviking-server --host 0.0.0.0 --port 1933 --config /app/ov.conf
    ports:
      - "18081:1933"
    volumes:
      - ./ov.conf:/app/ov.conf
      - openviking-data:/app/data
    networks:
      - deer-flow-dev
    restart: ${DOCKER_RESTART_POLICY:-no}

volumes:
  langgraph-postgres-data: {}
  frontend-node-modules: {}
  openviking-data: {}

networks:
  deer-flow-dev:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.208.0/24
