user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    upstream dashboard_backend {
        server dashboard:8889;
    }

    server {
        listen 80;
        server_name razer.local;

        root /usr/share/nginx/html;
        index index.html;

        # Dashboard UI
        location / {
            try_files $uri $uri/ /index.html;
        }

        # API Proxy
        location /api/ {
            proxy_pass http://dashboard_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket support (for future live logs)
        location /ws {
            proxy_pass http://dashboard_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        # Service Proxies with Placeholder Auto-Login Injection
        location /linkwarden/ {
            proxy_pass http://linkwarden:3000/;
            proxy_set_header Host $host;
            # Cookie injection happens via dashboard logic or custom headers
        }

        location /wikijs/ {
            proxy_pass http://wikijs:3001/;
            proxy_set_header Host $host;
        }
    }
}
