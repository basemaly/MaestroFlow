version: '3.8'

services:
  dashboard:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: unified-dashboard
    ports:
      - "8889:8889"
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DASHBOARD_PORT=8889
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - dashboard-net

  nginx:
    image: nginx:alpine
    container_name: dashboard-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/certs:/etc/nginx/certs:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - dashboard
    restart: unless-stopped
    networks:
      - dashboard-net

networks:
  dashboard-net:
    driver: bridge
